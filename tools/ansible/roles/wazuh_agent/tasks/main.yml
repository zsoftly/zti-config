---
# Wazuh Agent Installation
# Minimal setup - policies managed by Wazuh Manager

- name: Detect OS
  ansible.builtin.setup:
    gather_subset: ["!all", "!min", "distribution", "os_family", "architecture"]

- name: Set architecture
  ansible.builtin.set_fact:
    wazuh_arch: "{{ 'aarch64' if ansible_architecture in ['aarch64', 'arm64'] else 'x86_64' }}"

# Debian/Ubuntu
- name: Install on Debian/Ubuntu
  when: ansible_os_family == "Debian"
  block:
    - name: Check GPG key
      ansible.builtin.stat:
        path: /usr/share/keyrings/wazuh-archive-keyring.gpg
      register: wazuh_gpg_key

    - name: Add GPG key
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -fsSL https://packages.wazuh.com/key/GPG-KEY-WAZUH | \
          gpg --dearmor --batch --yes -o /usr/share/keyrings/wazuh-archive-keyring.gpg
        executable: /bin/bash
      changed_when: true
      when: not wazuh_gpg_key.stat.exists or wazuh_gpg_key.stat.size == 0

    - name: Add repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/wazuh.list
        # yamllint disable-line rule:line-length
        content: "deb [signed-by=/usr/share/keyrings/wazuh-archive-keyring.gpg] https://packages.wazuh.com/4.x/apt/ stable main\n"
        mode: "0644"

    - name: Install package
      ansible.builtin.apt:
        name: wazuh-agent
        state: "{{ wazuh_agent_package_state }}"
        update_cache: true

# RHEL/CentOS/Fedora
- name: Install on RedHat
  when: ansible_os_family == "RedHat"
  block:
    - name: Add GPG key
      ansible.builtin.rpm_key:
        key: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present

    - name: Add repository
      ansible.builtin.yum_repository:
        name: wazuh
        description: Wazuh repository
        baseurl: https://packages.wazuh.com/4.x/yum/
        gpgkey: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        gpgcheck: true
        enabled: true

    - name: Install package
      ansible.builtin.yum:
        name: wazuh-agent
        state: "{{ wazuh_agent_package_state }}"

# Configuration
- name: Deploy config
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: wazuh
    mode: "0644"
  notify: Restart wazuh agent

# Enrollment
- name: Check enrollment
  ansible.builtin.stat:
    path: /var/ossec/etc/client.keys
  register: wazuh_client_keys

- name: Check current group config
  ansible.builtin.slurp:
    src: /var/ossec/etc/.enrolled_groups
  register: wazuh_current_groups
  failed_when: false

- name: Set enrollment needed flag
  ansible.builtin.set_fact:
    # Enroll only if client.keys is missing/empty OR service is not running
    # Both conditions checked independently — missing key always triggers enrollment,
    # stopped service alone does not (client.keys may be valid, service just needs start)
    # To force re-enrollment: delete client.keys, then re-run playbook
    wazuh_needs_enrollment: >-
      {{
        not wazuh_client_keys.stat.exists or
        wazuh_client_keys.stat.size == 0
      }}

- name: Enroll agent
  when: wazuh_needs_enrollment
  ansible.builtin.command:
    cmd: >-
      /var/ossec/bin/agent-auth
      -m {{ wazuh_manager_address }}
      -p {{ wazuh_manager_enrollment_port }}
      -A {{ wazuh_agent_name }}
      {{ '-G ' + wazuh_agent_group if wazuh_agent_group | length > 0 else '' }}
      {{ '-P ' + wazuh_authd_password if wazuh_authd_password | length > 0 else '' }}
  register: wazuh_enrollment
  changed_when: wazuh_enrollment.rc == 0
  failed_when:
    - wazuh_enrollment.rc != 0
    - "'Duplicate agent name' not in wazuh_enrollment.stderr"
  timeout: 30
  no_log: true

- name: Warn on duplicate enrollment
  when:
    - wazuh_needs_enrollment
    - wazuh_enrollment is defined
    - "'Duplicate agent name' in (wazuh_enrollment.stderr | default(''))"
  ansible.builtin.debug:
    msg: >-
      [WARNING] Agent {{ wazuh_agent_name }} is already registered on the manager
      but client.keys is missing or stale on this host. The agent cannot connect.
      To fix: delete agent {{ wazuh_agent_name }} from the Wazuh manager via API,
      then re-run this playbook.

- name: Save enrolled group config
  when: wazuh_needs_enrollment
  ansible.builtin.copy:
    content: "{{ wazuh_agent_group | default('') }}"
    dest: /var/ossec/etc/.enrolled_groups
    mode: "0600"

# Remote commands configuration
# logcollector.remote_commands=1 is required for agent.conf localfile commands
# pushed from the manager to be accepted. This is a local-only security gate
# that cannot be set via agent.conf itself.
- name: Configure remote commands
  ansible.builtin.lineinfile:
    path: /var/ossec/etc/local_internal_options.conf
    regexp: "^logcollector\\.remote_commands="
    line: "logcollector.remote_commands={{ '1' if wazuh_remote_commands_enabled else '0' }}"
    create: true
    mode: "0640"
    owner: root
    group: wazuh
  notify: Restart wazuh agent

# Service
- name: Start service
  ansible.builtin.systemd:
    name: wazuh-agent
    state: "{{ wazuh_agent_service_state }}"
    enabled: "{{ wazuh_agent_service_enabled }}"
    daemon_reload: true
  register: wazuh_service_start

- name: Verify connection
  ansible.builtin.wait_for:
    path: /var/ossec/logs/ossec.log
    search_regex: "Connected to the server"
    timeout: 30
  ignore_errors: true
  register: wazuh_connection
  when: wazuh_service_start is changed

- name: Status
  ansible.builtin.debug:
    msg: >-
      {{
        'Connected to manager' if (wazuh_connection is skipped or wazuh_connection is succeeded)
        else 'Connecting... check /var/ossec/logs/ossec.log'
      }}
