---
# Wazuh Agent Defaults

# Manager connection
wazuh_manager_address: "wazuh.example.com"
wazuh_manager_port: 1514
wazuh_manager_protocol: "tcp"
wazuh_manager_enrollment_port: 1515

# Agent identity
wazuh_agent_name: "{{ inventory_hostname }}"
wazuh_agent_group: ""

# Package management
# - "present": install if missing (allows upgrades via UI)
# - "latest":  always upgrade to latest
wazuh_agent_package_state: "present"

# Enrollment — empty means auto-enroll without password
wazuh_authd_password: ""

wazuh_agent_service_state: "started"
wazuh_agent_service_enabled: true

# Remote commands — manager can run commands on agent. Disabled by default.
wazuh_remote_commands_enabled: false

# Docker monitoring (docker-listener wodle). Enable on Docker hosts only.
# Prerequisites (invoking playbook handles these):
#   - Docker Engine installed
#   - python3-docker package installed
#   - wazuh user in `docker` group (for /var/run/docker.sock access)
wazuh_docker_monitoring_enabled: false
