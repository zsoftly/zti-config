---
# Wazuh Agent Defaults

# Manager connection
wazuh_manager_address: "wazuh.example.com"
wazuh_manager_port: 1514
wazuh_manager_protocol: "tcp"
wazuh_manager_enrollment_port: 1515

# Agent identity
wazuh_agent_name: "{{ inventory_hostname }}"
wazuh_agent_group: ""

# Package management
# - "present": install if missing (allows upgrades via UI)
# - "latest":  always upgrade to latest
wazuh_agent_package_state: "present"

# Enrollment — empty means auto-enroll without password
wazuh_authd_password: ""

wazuh_agent_service_state: "started"
wazuh_agent_service_enabled: true

# Remote commands — manager can run commands on agent. Disabled by default.
wazuh_remote_commands_enabled: false

# Docker monitoring (docker-listener wodle). Enable on Docker hosts only.
# Requires Docker Engine to be installed before this role runs.
# The role installs python3-docker and adds wazuh to the docker group automatically.
wazuh_docker_monitoring_enabled: false

# Custom application logs — list of localfile entries appended to ossec.conf
# after the standard system logs (syslog/auth/dpkg/kern). Each entry takes:
#   - location  (required): file path or glob, e.g. "/var/log/myapp/*.log"
#   - log_format          : default "syslog"; also "command", "full_command", "json", "multi-line", etc.
#   - command             : for command/full_command formats
#   - alias               : optional alias for command output
#   - frequency           : seconds, for command formats
# Example:
#   wazuh_custom_localfiles:
#     - location: /var/log/headscale/*.log
#       log_format: syslog
wazuh_custom_localfiles: []
