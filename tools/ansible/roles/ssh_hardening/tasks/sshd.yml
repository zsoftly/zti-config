---
# SSH Daemon Configuration - Hardened settings
# Defense layer: Application-level security

- name: Backup original sshd_config
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.orig
    remote_src: true
    force: false
    mode: "0600"
  tags: [ssh, sshd]

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  notify: restart sshd
  tags: [ssh, sshd]

- name: Set correct permissions on SSH directory
  ansible.builtin.file:
    path: /etc/ssh
    state: directory
    mode: "0755"
    owner: root
    group: root
  tags: [ssh, sshd]

- name: Validate SSH configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false
  tags: [ssh, sshd, validate]
