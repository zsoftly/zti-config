---
name: Release

# Triggered by plain numeric tags: 0.0.1, 0.1.0, 1.0.0, etc.
# Tag format matches zcp-cli pattern (no v-prefix).
#
# To release:
#   1. Update CHANGELOG.md — move [Unreleased] entries to the new version
#   2. make release VERSION=0.0.2
#   This workflow then creates the GitHub Release automatically.

on:
  push:
    tags: ['[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          if ! git rev-parse --verify "refs/tags/${{ github.event.inputs.tag }}" > /dev/null 2>&1; then
            echo "[FAIL] Tag '${{ github.event.inputs.tag }}' does not exist in this repository"
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog entry
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.version.outputs.tag }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changes }}
          draft: false
          prerelease: false
